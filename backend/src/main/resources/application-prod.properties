# Production Database (TiDB Cloud / MySQL)
# Use internbot_db — TiDB will create it automatically
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update = Hibernate auto-creates/updates tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server port (Render injects $PORT)
server.port=${PORT:8080}

# Upload directory
file.upload-dir=${UPLOAD_DIR:uploads}

logging.level.root=WARN
logging.level.com.example=INFO

# Email Properties (can be overridden via env vars in Render)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:smalika7489@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
