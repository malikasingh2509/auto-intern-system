# Production Database (Cloud MySQL - Aiven/Railway/PlanetScale)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# File Upload (production limits)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server port (Render uses $PORT env var)
server.port=${PORT:8080}

# Uploads directory (Render ephemeral FS warning - see README)
file.upload-dir=${UPLOAD_DIR:uploads}

# Logging
logging.level.root=WARN
logging.level.com.example=INFO
